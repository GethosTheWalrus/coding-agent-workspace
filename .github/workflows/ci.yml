name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t fastapi-todo-app .

      - name: Run tests inside Docker container
        run: |
          docker run --rm fastapi-todo-app pytest --cov=app --cov-report=term-missing

      - name: Enforce coverage >= 90%
        run: |
          docker run --rm fastapi-todo-app coverage report --fail-under=90
